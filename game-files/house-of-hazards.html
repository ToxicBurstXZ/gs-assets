<html>
<head>
        <script src="https://cdn.jsdelivr.net/gh/ToxicBurstXZ/Assets@main/js/startup.js"></script>
    <base target="_blank">
    <style type="text/css">
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: rgb(95, 222, 231);
        }
        .webgl-content {
            width: 100%;
            height: 100%;
        }
        #button {
            display: none;
        }
        .imgb_vis {
            animation: imgb-animation 7s linear;
        }
        @keyframes imgb-animation {
            10% { transform: translateX(0); }
            20% { transform: translateX(100px); }
            90% { transform: translateX(100px); }
            100% { transform: translateX(0); }
        }
    </style>
</head>
<body dir="ltr">
    <script>
        // Suppress all alerts, confirms, and prompts
        window.alert = function() {};
        window.confirm = function() { return true; };
        window.prompt = function() { return null; };
    </script>
    <script src="https://cdn.jsdelivr.net/gh/lee2sman/everyday@d45d601d2c4d60adf809a0b677c00b7d12aba7e9/96/TemplateData/UnityProgress.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/goobertime/math@12f2387f37be9b093112414ab5e6ab148c154c94/newgames/houseofhazards/UnityLoader.js"></script>
    <script>
        var gameInstance = UnityLoader.instantiate("gameContainer", "https://cdn.jsdelivr.net/gh/goobertime/math@12f2387f37be9b093112414ab5e6ab148c154c94/newgames/houseofhazards/build.json", {
            onProgress: UnityProgress,
            Module: {
                onRuntimeInitialized: function() {
                    UnityProgress(gameInstance, "complete")
                }
            }
        });
    </script>
    <div class="webgl-content">
        <div id="gameContainer" style="width: 100vw; height: 100vh; padding: 0px; margin: 0px; border: 0px; position: relative; background: rgb(95, 222, 231);">
            <canvas style="width: 100%; height: 100%; cursor: default;" id="#canvas" width="1904" height="633"></canvas>
            <div class="logo Dark" style="display: none;"></div>
            <div class="progress Dark" style="display: none;">
                <div class="empty" style="width: 0%;"></div>
                <div class="full" style="width: 100%;"></div>
            </div>
        </div>
    </div>
</body>
</html>

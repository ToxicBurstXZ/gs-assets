<script>
(function() {
    // Lock window.open
    Object.defineProperty(window, 'open', {
        value: function() { return null; },
        writable: false, configurable: false
    });

    // Intercept dynamically created anchor tags
    const origCreateElement = document.createElement.bind(document);
    document.createElement = function(tag) {
        const el = origCreateElement(tag);
        if (tag.toLowerCase() === 'a') {
            const origClick = el.click.bind(el);
            el.click = function() {
                const href = el.getAttribute('href');
                if (href && !href.startsWith('#')) {
                    console.warn('Blocked anchor click to:', href);
                    return null;
                }
                return origClick();
            };
        }
        return el;
    };

    // Intercept all clicks on the document
    document.addEventListener('click', function(e) {
        const a = e.target.closest('a');
        if (a && a.href && !a.href.startsWith('#')) {
            e.preventDefault();
            e.stopImmediatePropagation();
            console.warn('Blocked click redirect to:', a.href);
        }
    }, true);

    // Block navigation entirely
    window.addEventListener('beforeunload', function(e) {
        e.preventDefault();
        e.returnValue = '';
    });
})();
</script>

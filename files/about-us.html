<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-40deg, #b400ff 0%, #000 40%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .profile-btn {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            background: #000;
        }

        .profile-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .profile-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: #000;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            position: relative;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 2px solid #fff;
        }

        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(50px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #000;
            color: white;
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: #000;
            transform: rotate(90deg);
        }

        .modal-image {
            width: 150px;
            height: 150px;
            border-radius: 15%;
            object-fit: cover;
            margin: 0 auto 20px;
            display: block;
        }

        .modal-content h2 {
            color: #fff;
            margin-bottom: 10px;
            text-align: center;
        }

        .modal-content .role {
            color: #D6D6D6;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #fff;
            line-height: 1.6;
            text-align: center;
        }
        /* THIS IS FOR TEXT NOT MODEL */

            .text-ab {
        color: #fff;
        font-family: mono;
        font-size: 80px;
        text-align: center;
        padding: 5px;
        background: transparent;
    }
    .text-p {
        color: #fff;
        font-size: 20px;
        font-family: mono;
        text-align: center;
        border: 2px solid black;
        border-color: #000;
        
    }
    .text-container {
        overflow: visible;
    }

    .animation {
        display: block;
        transform: translateY(100%);
        opacity: 0;
    }

    .animation.reveal {
        animation: slideUp 1s ease-out forwards;
    }

    @keyframes slideUp {
        0% {
            transform: translateY(100%);
            opacity: 0;
        }

        100% {
            transform: translateY(0);
            opacity: 1;
        }
    }
    </style>
</head>
<body>
<div class="text-container">
    <span class="animation text-ab">About Us</span>
    <div class="container" id="profileContainer"></div>
    
    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal()">&times;</button>
            <img class="modal-image" id="modalImage" src="" alt="Profile">
            <h2 id="modalName"></h2>
            <div class="role" id="modalRole"></div>
            <p id="modalDescription"></p>
        </div>
    </div>

    <script>
        const profiles = [
            {
                name: "Toxic",
                role: "(Co-)Owner, Lead Developer",
                image: "https://cdn.jsdelivr.net/gh/ToxicBurstXZ/img@main/profiles/toxic-pf.png",
                description: "Owner of Cooking Time, Web Developer, Coding Languages : HTML, CSS, JS, and Learn Python. I usually design the main pages of the website"
            },
            {
                name: "Void",
                role: "(Co-)Owner, Developer",
                image: "https://cdn.jsdelivr.net/gh/ToxicBurstXZ/img@main/profiles/void.gif",
                description: "Owner of The Void, Backend Developer, i know Python and C++. Creating and fixing bugs and games (also I obtained all the games)"
            }
        ];

        function createProfileButtons() {
            const container = document.getElementById('profileContainer');
            
            profiles.forEach((profile, index) => {
                const btn = document.createElement('button');
                btn.className = 'profile-btn';
                btn.onclick = () => openModal(index);
                
                const img = document.createElement('img');
                img.src = profile.image;
                img.alt = profile.name;
                
                btn.appendChild(img);
                container.appendChild(btn);
            });
        }

        function openModal(index) {
            const profile = profiles[index];
            document.getElementById('modalImage').src = profile.image;
            document.getElementById('modalName').textContent = profile.name;
            document.getElementById('modalRole').textContent = profile.role;
            document.getElementById('modalDescription').textContent = profile.description;
            document.getElementById('modal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }

        // Close modal when clicking outside
        document.getElementById('modal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Initialize profile buttons
        createProfileButtons();
    </script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const animatedText = document.querySelector('.animation');

        setTimeout(() => {
            animatedText.classList.add('reveal');
        }, 100);
    });
</script>
</body>
</html>

<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>A warm cup of coffee</title>
  <desc>Illustrated coffee cup with steam rising, sitting on a saucer</desc>

  <style>
    .steam { stroke: #c8a97e; stroke-width: 3; fill: none; stroke-linecap: round; opacity: 0.7; }
    @keyframes rise1 { 0%{transform:translateY(0) scaleX(1);opacity:0.7} 100%{transform:translateY(-30px) scaleX(1.3);opacity:0} }
    @keyframes rise2 { 0%{transform:translateY(0) scaleX(1);opacity:0.7} 100%{transform:translateY(-30px) scaleX(0.8);opacity:0} }
    .s1 { animation: rise1 2s ease-out infinite; transform-origin: 310px 140px; }
    .s2 { animation: rise2 2s ease-out infinite 0.6s; transform-origin: 340px 130px; }
    .s3 { animation: rise1 2s ease-out infinite 1.2s; transform-origin: 370px 140px; }
  </style>

  <!-- Saucer -->
  <ellipse cx="340" cy="400" rx="160" ry="22" fill="#6b3f1f"/>
  <ellipse cx="340" cy="393" rx="150" ry="18" fill="#8b5a2b"/>
  <ellipse cx="340" cy="390" rx="140" ry="14" fill="#a0672f"/>

  <!-- Cup body -->
  <path d="M210 250 Q200 390 270 390 L410 390 Q480 390 470 250 Z" fill="#6b3f1f"/>
  <!-- Cup inner (coffee surface) -->
  <ellipse cx="340" cy="250" rx="130" ry="28" fill="#3b1c08"/>
  <!-- Coffee surface highlight -->
  <ellipse cx="325" cy="248" rx="55" ry="12" fill="#5a2d0c" opacity="0.5"/>
  <!-- Cup front face shading -->
  <path d="M220 260 Q210 385 272 388 L270 390 Q200 390 210 250 Z" fill="#4a2a10" opacity="0.5"/>
  <!-- Cup rim -->
  <ellipse cx="340" cy="250" rx="130" ry="28" fill="none" stroke="#5a3015" stroke-width="4"/>

  <!-- Handle -->
  <path d="M468 290 Q530 290 530 340 Q530 385 468 375" fill="none" stroke="#6b3f1f" stroke-width="22" stroke-linecap="round"/>
  <path d="M468 290 Q524 290 524 340 Q524 379 468 375" fill="none" stroke="#8b5a2b" stroke-width="10" stroke-linecap="round"/>

  <!-- Coffee crema ring -->
  <ellipse cx="340" cy="250" rx="105" ry="20" fill="none" stroke="#a0672f" stroke-width="3" opacity="0.6"/>

  <!-- Latte art heart -->
  <path d="M330 244 Q325 237 315 240 Q305 243 310 253 Q315 262 330 270 Q345 262 350 253 Q355 243 345 240 Q335 237 330 244Z" fill="#c8a97e" opacity="0.55"/>

  <!-- Steam paths -->
  <path class="steam s1" d="M310 230 Q300 210 312 190 Q324 170 314 150"/>
  <path class="steam s2" d="M340 225 Q330 200 342 178 Q354 156 344 134"/>
  <path class="steam s3" d="M370 230 Q360 210 372 190 Q384 170 374 150"/>
</svg>


        // ─── Cache Configuration ──────────────────────────────────────────────────────
        const DB_NAME = 'GameCacheDB';
        const STORE_NAME = 'GameFiles';
        const CACHE_DURATION = 90 * 24 * 60 * 60 * 1000;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME))
                        db.createObjectStore(STORE_NAME, {
                            keyPath: 'url'
                        });
                };
                request.onsuccess = (e) => resolve(e.target.result);
                request.onerror = (e) => reject(e.target.error);
            });
        }

        async function saveToCache(url, content) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const store = db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME);
                const req = store.put({
                    url,
                    content,
                    timestamp: Date.now()
                });
                req.onsuccess = () => resolve();
                req.onerror = () => reject(new Error('Cache error'));
            });
        }

        async function getFileFromCache(url) {
            const db = await openDB();
            return new Promise((resolve, reject) => {
                const store = db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME);
                store.get(url).onsuccess = async (e) => {
                    const data = e.target.result;
                    if (data && (Date.now() - data.timestamp) < CACHE_DURATION) {
                        resolve(data.content);
                    } else {
                        try {
                            const text = await fetch(url).then(r => r.text());
                            await saveToCache(url, text);
                            resolve(text);
                        } catch (err) {
                            reject(err);
                        }
                    }
                };
                store.get(url).onerror = () => reject(new Error('DB error'));
            });
        }

        function openGame(fileUrl, gameName) {
            getFileFromCache(fileUrl).then((text) => {
                const w = window.open('', '_blank');
                if (w) {
                    w.document.open();
                    w.document.write(text);
                    w.document.close();
                } else {
                    alert('Failed to open ' + gameName + '. Please allow popups.');
                }

        // ─── Rendering ────────────────────────────────────────────────────────────────
        // IntersectionObserver: swap data-src → src only when image enters the viewport
        const imgObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const img = entry.target;
                    img.src = img.dataset.src;
                    imgObserver.unobserve(img);
                }
            });
        }, {
            rootMargin: '200px'
        }); // start loading 200 px before visible

        function displayGames(games) {
            const gameContainer = document.getElementById('game-container');
            gameContainer.innerHTML = '';

            if (games.length === 0) {
                gameContainer.innerHTML = '<div class="no-results">No Games Found</div>';
                return;
            }

            // Build all cards into a fragment — one single DOM insertion at the end
            const fragment = document.createDocumentFragment();

            games.forEach(game => {
                const gameDiv = document.createElement('div');
                gameDiv.className = 'game-container';
                gameDiv.onclick = () => openGame(game.file, game.name);

                const gameImage = document.createElement('img');
                gameImage.dataset.src = game.img; // lazy: real URL stored in data-src
                gameImage.src = ''; // blank until observed
                gameImage.alt = game.name;
                gameImage.className = 'game-image';
                gameImage.loading = 'lazy'; // native lazy-load as secondary hint
                imgObserver.observe(gameImage);

                const gameTitle = document.createElement('div');
                gameTitle.textContent = game.name;
                gameTitle.className = 'game-title';

                gameDiv.appendChild(gameImage);
                gameDiv.appendChild(gameTitle);
                fragment.appendChild(gameDiv);
            });

            gameContainer.appendChild(fragment); // single reflow
        }

        displayGames(gamesData);

        // ─── Search with debounce ─────────────────────────────────────────────────────
        let searchTimer;
        document.getElementById('search-input').addEventListener('input', (e) => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                const term = e.target.value.toLowerCase().trim();
                displayGames(term ? gamesData.filter(g => g.name.toLowerCase().includes(term)) : gamesData);
            }, 150); // wait 150 ms after the user stops typing
        });

    <!-- Star animation deferred until browser is idle so it never delays first paint -->
    <script>
        function initStars() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            Object.assign(canvas.style, {
                position: 'fixed',
                top: '0',
                left: '0',
                width: '100vw',
                height: '100vh',
                zIndex: '-1'
            });
            document.body.appendChild(canvas);

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            // 100 stars instead of 200 — visually identical, half the per-frame work
            const stars = Array.from({
                length: 100
            }, () => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 3 + 0.5
            }));

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'white';
                stars.forEach(s => {
                    s.y += s.speed;
                    if (s.y > canvas.height) {
                        s.y = 0;
                        s.x = Math.random() * canvas.width;
                    }
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // Use requestIdleCallback when available, otherwise defer 200 ms
        if ('requestIdleCallback' in window) {
            requestIdleCallback(initStars);
        } else {
            setTimeout(initStars, 200);
        }
